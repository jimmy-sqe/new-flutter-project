name: app
description: Flutter app - UI, navigation, BLoC, DI wiring.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  auto_route: ^7.8.4
  dartx: ^1.1.0
  domain:
    path: ../domain
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  freezed_annotation: ^2.4.1
  get_it: ^7.7.0
  initializer:
    path: ../initializer
  injectable: ^2.3.2
  resources:
    path: ../resources
  rxdart: ^0.28.0
  shared:
    path: ../shared

dev_dependencies:
  auto_route_generator: ^7.3.2
  bloc_test: ^9.1.3
  build_runner: ^2.4.15
  flutter_lints: ^2.0.1
  flutter_test:
    sdk: flutter
  freezed: ^2.5.0
  injectable_generator: ^2.4.1
  mocktail: ^0.3.0

flutter:
  uses-material-design: true
